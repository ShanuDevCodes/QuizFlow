name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Matches gradle/gradle-daemon-jvm.properties (toolchainVersion=21).
  JAVA_VERSION: '21'

jobs:
  verify:
    name: Lint, unit tests, debug build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Deliberately no explicit `sdkmanager --install "platforms;android-<N>"` here: this
      # project's compileSdk (37, bumped for the alpha Compose BOM / Material3 Expressive —
      # see docs/work/PRD.md #14) is a bleeding-edge preview platform not reliably resolvable
      # by package name through sdkmanager. Accepting licenses lets AGP auto-download exactly
      # the SDK components it needs during the Gradle build itself (the same thing that
      # happens locally — nobody manually ran sdkmanager for platform 37 there either).
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Run unit tests (domain, data, ViewModel, Robolectric UI)
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Generate Jacoco coverage report
        run: ./gradlew jacocoTestReport --stacktrace

      - name: Run Android Lint
        run: ./gradlew lintDebug --stacktrace

      - name: Assemble debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/testDebugUnitTest
          retention-days: 14

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage-report
          path: app/build/reports/jacoco/jacocoTestReport/html
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report
          path: app/build/reports/lint-results-debug.html
          retention-days: 14

  release-gate:
    name: Release build gate (R8)
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Deliberately no explicit `sdkmanager --install "platforms;android-<N>"` here: this
      # project's compileSdk (37, bumped for the alpha Compose BOM / Material3 Expressive —
      # see docs/work/PRD.md #14) is a bleeding-edge preview platform not reliably resolvable
      # by package name through sdkmanager. Accepting licenses lets AGP auto-download exactly
      # the SDK components it needs during the Gradle build itself (the same thing that
      # happens locally — nobody manually ran sdkmanager for platform 37 there either).
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses

      - name: Assemble release (minified with R8)
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
